[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xxx"
version = "0.1.0"
description = "xxx"
requires-python = ">=3.10"
authors = [
    {name = "Your Name", email = "your.email@example.com"},
]
dependencies = [
    "openai>=1.0.0",
    "SQLAlchemy>=2.0.0",
    "python-dotenv==1.1.1",
    "tqdm>=4.67.1",
    "openpyxl",
    "jinja2",
    "pandas",
    "PyYAML>=6.0",
    "PyMuPDF>=1.24",
    "openai-batch-wrapper @ git+https://github.com/ZhengGong-hub/openai-batch-wrapper.git@v0.0.5"
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.setuptools]
package-dir = {"" = "src"}