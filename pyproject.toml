
[project]
name = "academic_data_download"
version = "0.1.0"
description = "Academic research data"
requires-python = ">=3.9"
authors = [
    {name = "Your Name", email = "your.email@example.com"},
]
dependencies = [
    "SQLAlchemy>=2.0.0",
    "wrds==3.4.0",
    "python-dotenv==1.1.1",
    "fastparquet==2024.11.0",
    "tqdm>=4.67.1",
    "openpyxl",
    "jinja2",
    "pandas",
    "requests"
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3
