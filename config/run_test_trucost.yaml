# The one canonical run config — every carbontax command reads this file.
# Edit here, then run the stage; no command-line arguments anywhere.
# All parameters are explicit: the code has no hidden defaults, a missing key fails loudly.
# File locations are derived from run_name: everything lives in batch_folder/<run_name>/.

run_name: test_trucost

# ── Shared data locations — files passed between stages ───────────────────────
data:
  input:   # external files made outside this repo
    company_csv: data/input/company.csv  # raw CIQ company-universe export
    trucost_csv: data/input/trucost_environment.csv  # companyid universe for identifier: trucost_companyid
  output:  # produced by the pipeline stages
    intermed_dir: data/output/intermed   # stage-1 state: batch folders of 10 companies each
    pdfs_dir: data/output/sustain_reports_pdfs                                 # downloaded PDFs (<filingId>.pdf)
    mapping_csv: data/output/ciq_filing_mapping/company_esgfiling_mapping.csv  # canonical company↔filing mapping

# ── Stage 1: acquire_pdfs — download PDFs from S&P CIQ ────────────────────────
acquire_pdfs:
  start_date: "2015-01-01"
  end_date: "2025-01-01"
  resume_from: 0          # skip the first N intermed batch folders
  init_folders: false     # true = (re)create intermed batch folders from company_csv, then stop

# ── Stage 2: prepare_batch_input — PDFs → chunks → batch JSONL (local only) ───
prepare_batch_input:
  identifier: trucost_companyid   # "fileid" or "companyid"; empty/omitted companyid list = all companyids or "trucost_companyid"
  model: gpt-5-mini         # stamped into the ref parquet and every batch request
  temperature: null         # request temperature; null = omit (gpt-5-mini rejects any non-default value)
  max_chunks_per_file: 50     # cap per filing; null = no cap
  chunk_selection: random     # head | random — how to pick when a filing exceeds max_chunks_per_file
  chunk_sample_seed: 42       # RNG seed for chunk_selection: random (reproducible draw)
  input_price_per_1m_usd: 0.375  # $/1M input tokens (batch-discounted rate); used for the batch cost estimate
  min_page_tokens: 200         # drop pages with fewer tokens before chunking
  chunk_max_tokens: 950       # splitter window size
  chunk_overlap_tokens: 50   # splitter overlap between consecutive chunks
  # batch-input sharding: OpenAI caps one batch at 50k requests AND ~200MB per input file,
  # so prepare writes an indexed batch_files/ folder, rolling shards at whichever cap hits first
  max_requests_per_shard: 45000    # headroom under the 50k-request cap
  max_bytes_per_shard: 188743680   # 180 MiB, headroom under the ~200MB file cap
  max_tokens_per_shard: 15000000   # headroom under OpenAI's 20M enqueued-token cap (usually the binding one)
  filter_keywords:            # a chunk must contain at least one (case-insensitive)
    - carbon
    - emission
    - renewable
    - solar
    - wind turbine
    - wind power
    - energy efficiency

# ── Stage 3: openai_batch — submit → status → download → parse ────────────────
# The batch JSONL already carries the model and schema; batch ids and file
# locations are tracked in batch_folder/<run_name>/batch_status.db.
openai_batch:
  submit_wait_seconds: 600   # pause between shard submissions (throttle under the enqueued-token cap)

# ── Stage 4: analysis — parsed CSV → review workbook ──────────────────────────
# (per-bucket sheets, governance, adoption/coverage/accuracy stats, raw dump)
# No tunable settings: reads  batch_folder/<run_name>/parsed.csv,
#                      writes batch_folder/<run_name>/report.xlsx.
analysis: {}
